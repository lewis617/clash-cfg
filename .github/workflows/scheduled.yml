name: Update Clash YAML

on:
  # 每天 UTC 6:00 / 18:00 执行（北京时间 14:00 / 02:00）
  # 覆盖 clashfree 两个主更新窗口（约 UTC 4:00 / 17:52），留 CDN 缓冲
  schedule:
    - cron: "0 6,18 * * *"
  # 手动触发
  workflow_dispatch:
  # 定时触发（不设 push 触发，避免 amend+force-push 循环）

jobs:
  update-clash-yml:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download and process YAML
      run: |
        npm install
        npm run start

    - name: Commit and push changes
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
        git add clash-provider.yml
        # 仅在有更改时提交
        if ! git diff --cached --quiet; then
          # 用 amend 覆盖同一条 commit，避免历史堆积
          git commit --amend -m "Update clash-provider.yml"
          git push --force
        else
          echo "No changes to commit."
        fi
        # 无论是否有提交，都 purge jsDelivr 缓存，确保 CDN 与仓库一致
        curl https://purge.jsdelivr.net/gh/lewis617/clash-cfg@main/clash-cfg.yml
        curl https://purge.jsdelivr.net/gh/lewis617/clash-cfg@main/clash-provider.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub 提供的 token