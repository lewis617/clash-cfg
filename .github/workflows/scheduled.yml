name: Update Clash YAML

on:
  # 每天 UTC 6:00 / 18:00 执行（北京时间 14:00 / 02:00）
  # 覆盖 clashfree 两个主更新窗口（约 UTC 4:00 / 17:52），留 CDN 缓冲
  schedule:
    - cron: "0 6,18 * * *"
  # 手动触发
  workflow_dispatch:

jobs:
  update-clash-yml:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download and process YAML
      run: |
        npm install
        npm run start
        # 备份生成的产物，切换分支后覆盖
        cp clash-provider.yml /tmp/clash-provider.yml

    - name: Push to provider branch
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
        # 清理工作区tracked文件的改动（如package-lock.json），避免切换分支冲突
        git checkout -- .
        # 切到 provider 分支（只存 clash-provider.yml 产物）
        git checkout -B provider origin/provider
        cp /tmp/clash-provider.yml clash-provider.yml
        git add clash-provider.yml
        # 用 amend 覆盖同一条 commit，避免历史堆积
        git commit --amend -m "Update clash-provider.yml"
        git push --force origin provider
        # purge jsDelivr 缓存
        curl https://purge.jsdelivr.net/gh/lewis617/clash-cfg@provider/clash-provider.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
